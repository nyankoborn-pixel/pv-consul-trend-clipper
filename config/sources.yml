# 動画ソース定義
#
# YouTube は完全廃止。bot 検知の運用負荷を回避するため、
# 公式 API / アーカイブから直接 MP4 をダウンロードする方式に統一。
#
# type:
#   pixabay          : Pixabay Video API     (https://pixabay.com/api/docs/)
#   pexels           : Pexels Video API      (https://www.pexels.com/api/)
#   nasa             : NASA Image and Video Library (https://images-api.nasa.gov)
#   usgs_volcano     : USGS Volcano Hazards multimedia (web scraping、ベストエフォート)
#   internet_archive : Internet Archive advancedsearch (https://archive.org)
#
# weight             : 選定優先度 (1-10、高いほど優先)
# authority_intro    : 台本冒頭で使われるソース紹介句のヒント
# license            : 概要欄の出典表記用ラベル
#
# 全ソースの動画は元音声カット + 出典明記の上で利用する。

sources:
  # ===== メイン取得元 (フリー素材プラットフォーム) =====

  - name: "Pixabay"
    type: "pixabay"
    queries:
      - "natural disaster"
      - "earthquake"
      - "tornado"
      - "hurricane"
      - "tsunami"
      - "volcano"
      - "lightning"
    weight: 8
    authority_intro: "Pixabayで公開されている自然現象の映像"
    license: "Pixabay License"

  - name: "Pexels"
    type: "pexels"
    queries:
      - "disaster"
      - "explosion"
      - "storm"
      - "shocking"
    weight: 8
    authority_intro: "Pexelsで公開されているフリー素材映像"
    license: "Pexels License"

  # ===== サブ取得元 (公的機関、権威付け用) =====

  - name: "NASA Image and Video Library"
    type: "nasa"
    queries:
      - "spacewalk"
      - "EVA extravehicular"
      - "splashdown"
      - "Crew Dragon"
      - "Falcon Heavy"
      - "DART asteroid"
      - "aurora ISS"
      - "Mars rover"
      - "solar flare"
    weight: 7
    authority_intro: "米国航空宇宙局NASAが公開した映像"
    license: "Public Domain (NASA media usage guidelines)"

  - name: "USGS Volcano Hazards"
    type: "usgs_volcano"
    weight: 7
    authority_intro: "米国地質調査所USGSの火山活動アーカイブ映像"
    license: "Public Domain (U.S. Government work)"

  # ===== サブ取得元 (歴史的衝撃映像) =====

  - name: "Internet Archive"
    type: "internet_archive"
    queries:
      - "explosion footage"
      - "natural disaster archival"
      - "historical earthquake"
      - "lightning storm"
    weight: 5
    authority_intro: "Internet Archiveに保存された歴史的映像"
    license: "Various (verify per-item)"

# 取得設定
fetch:
  # 各クエリで取得する最大件数
  per_query_results: 6
  # HTTP タイムアウト (秒)
  request_timeout: 30
  # 最低動画長 (秒): これ未満は除外 (短すぎる素材は使えない)
  min_duration: 5
