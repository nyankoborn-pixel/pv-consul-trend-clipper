name: Auto Post YouTube Shorts (Trend Clipper)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "dry_run (true でアップロードをスキップ)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: auto-post
  cancel-in-progress: false

jobs:
  post:
    name: Generate & post Shorts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      voicevox:
        image: voicevox/voicevox_engine:cpu-latest
        ports:
          - 50021:50021

    env:
      DRY_RUN: ${{ inputs.dry_run }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
      VOICEVOX_URL: http://localhost:50021
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps (ffmpeg, fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-noto-cjk \
            fonts-noto-cjk-extra
          ffmpeg -version | head -n 1
          fc-list | grep -i "noto" | head -n 5 || true

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for VOICEVOX engine
        run: |
          echo "Waiting for VOICEVOX engine on :50021 ..."
          # /version は古いバージョンに無いことがあるため / (HTTP 200) を見る
          for i in $(seq 1 90); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:50021/ || echo "000")
            if [ "$code" = "200" ] || [ "$code" = "404" ]; then
              echo "VOICEVOX engine is up (HTTP $code)."
              curl -fsS http://localhost:50021/version || true
              echo
              exit 0
            fi
            sleep 2
          done
          echo "VOICEVOX engine did not become ready in time"
          exit 1

      - name: Step 1 — fetch_videos
        run: python src/fetch_videos.py

      - name: Step 2 — select_video
        run: python src/select_video.py

      - name: Step 3 — generate_script
        run: python src/generate_script.py

      - name: Step 4 — make_video
        run: python src/make_video.py

      - name: Step 5 — upload_youtube
        run: python src/upload_youtube.py

      - name: Upload artifact (output.mp4)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ github.run_id }}
          path: |
            output.mp4
            work/script.json
            work/selected.json
          if-no-files-found: warn
          retention-days: 7

      - name: Commit logs
        if: success()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          if [ -d logs ] && [ -n "$(ls -A logs 2>/dev/null)" ]; then
            git add logs/
            if ! git diff --cached --quiet; then
              git commit -m "chore(logs): post run $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
              git push
            else
              echo "No log changes to commit."
            fi
          else
            echo "No logs directory or empty."
          fi
